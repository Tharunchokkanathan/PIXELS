{% extends "base.html" %}

{% block content %}
<div class="dashboard-layout">
    {{ sidebar('leader', 'dashboard') }}

    <main class="main-content">
        {{ header(user, 'Club Leader') }}

        <div class="content-wrapper">
            <style>
                .glass-form-container { background: var(--surface-color); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 40px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05); max-width: 650px; margin: 0 auto; position: relative; overflow: hidden; }
                .glass-form-container::before { content:''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #10b981, #047857); }
                .glass-input { background: rgba(0,0,0,0.02); border: 1px solid rgba(150,150,150,0.2); border-radius: 16px; padding: 15px 20px; font-size: 15px; width: 100%; color: var(--text-primary); transition: all 0.3s ease; box-sizing: border-box; }
                [data-theme='dark'] .glass-input { background: rgba(255,255,255,0.02); }
                .glass-input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); background: var(--surface-color); }
                .form-label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
            </style>

            <div class="page-title" style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 38px; font-weight: 800; letter-spacing: -1px;"><i class="fas fa-calendar-plus" style="color: #10b981; margin-right: 15px;"></i>Schedule Global Operation</h1>
                <p style="font-size: 16px; opacity: 0.8;">Setup a new technical workshop for node participants.</p>
            </div>

            <div class="glass-form-container">
                <form action="{{ url_for('create_event') }}" method="POST">
                    <div style="margin-bottom: 25px;">
                        <label class="form-label" for="title">Operation Title</label>
                        <input type="text" id="title" name="title" class="glass-input" required placeholder="e.g. Server Architecture 101">
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label class="form-label" for="date">Execution Timeline (Date)</label>
                        <input type="date" id="date" name="date" class="glass-input" required style="font-family: inherit; font-weight: 600;">
                    </div>

                    <div style="margin-bottom: 35px;">
                        <label class="form-label" for="description">Mission Briefing</label>
                        <textarea id="description" name="description" class="glass-input" rows="5" required placeholder="Outline the learning objectives and technical stack..." style="resize: vertical;"></textarea>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <button type="submit" class="btn" style="flex: 2; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 800; background: linear-gradient(135deg, #10b981, #047857); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); color: white;">
                            <i class="fas fa-broadcast-tower" style="margin-right: 8px;"></i> Broadcast Event Protocol
                        </button>
                        <a href="{{ url_for('leader_dashboard') }}" class="btn" style="flex: 1; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 700; background: transparent; color: var(--text-secondary); text-align: center; border: 1px solid rgba(150,150,150,0.3);">Abort</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="dashboard-layout">
    {{ sidebar('leader', 'add_member') }}

    <main class="main-content">
        {{ header(user, 'Club ' ~ user.role|capitalize) }}
        
        <div class="content-wrapper">
            <style>
                .glass-form-container { background: var(--surface-color); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 40px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05); max-width: 650px; margin: 0 auto; position: relative; overflow: hidden; }
                .glass-form-container::before { content:''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); }
                .glass-input { background: rgba(0,0,0,0.02); border: 1px solid rgba(150,150,150,0.2); border-radius: 16px; padding: 15px 20px; font-size: 15px; width: 100%; color: var(--text-primary); transition: all 0.3s ease; box-sizing: border-box; }
                [data-theme='dark'] .glass-input { background: rgba(255,255,255,0.02); }
                .glass-input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); background: var(--surface-color); }
                .form-label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
            </style>

            <div class="page-title" style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 38px; font-weight: 800; letter-spacing: -1px;"><i class="fas fa-user-astronaut" style="color: var(--primary-color); margin-right: 15px;"></i>Register Node Identity</h1>
                <p style="font-size: 16px; opacity: 0.8;">Grant a new user access to the PIXELS ecosystem.</p>
            </div>

            <div class="glass-form-container">
                <form action="{{ url_for('add_member') }}" method="POST">
                    <div style="margin-bottom: 25px;">
                        <label class="form-label" for="name">Alias (Full Name)</label>
                        <input type="text" id="name" name="name" class="glass-input" required placeholder="Student's name">
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label class="form-label" for="email">Comm Link (Email)</label>
                        <input type="email" id="email" name="email" class="glass-input" required placeholder="name@college.edu">
                    </div>

                    <div style="display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 250px;">
                            <label class="form-label" for="reg_no">Registry ID (Status)</label>
                            <input type="text" id="reg_no" name="reg_no" class="glass-input" required placeholder="e.g. 21BCE2001">
                        </div>

                        <div style="flex: 1; min-width: 250px;">
                            <label class="form-label" for="department">Operational Department</label>
                            <input type="text" id="department" name="department" class="glass-input" required placeholder="e.g. Computer Science">
                        </div>
                    </div>

                    <div style="margin-bottom: 35px; padding: 20px; background: rgba(0,0,0,0.03); border-radius: 20px; border: 1px dashed rgba(150,150,150,0.2);">
                        <label class="form-label" for="password"><i class="fas fa-key" style="margin-right: 5px;"></i> Temporary Access Code</label>
                        <input type="password" id="password" name="password" class="glass-input" required placeholder="Assign a default handshake">
                        <small style="color: var(--text-secondary); font-size: 12px; margin-top: 10px; display: block;">The user will use this handshake to decrypt their initial session.</small>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <button type="submit" class="btn" style="flex: 2; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 800; background: linear-gradient(135deg, var(--primary-color), var(--primary-dark)); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);">
                            <i class="fas fa-satellite-dish" style="margin-right: 8px;"></i> Broadcast Register
                        </button>
                        <a href="{{ url_for('leader_dashboard') }}" class="btn" style="flex: 1; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 700; background: transparent; color: var(--text-secondary); text-align: center; border: 1px solid rgba(150,150,150,0.3);">Abort</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
{% endblock %}

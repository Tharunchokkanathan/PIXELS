{% extends "base.html" %}

{% block content %}
<div class="dashboard-layout">
    {{ sidebar('leader', 'dashboard') }}

    <main class="main-content">
        {{ header(user, 'Club Leader') }}

        <div class="content-wrapper">
            <style>
                .glass-form-container { background: var(--surface-color); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 40px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05); max-width: 650px; margin: 0 auto; position: relative; overflow: hidden; }
                .glass-form-container::before { content:''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #f59e0b, #d97706); }
                .glass-input { background: rgba(0,0,0,0.02); border: 1px solid rgba(150,150,150,0.2); border-radius: 16px; padding: 15px 20px; font-size: 15px; width: 100%; color: var(--text-primary); transition: all 0.3s ease; box-sizing: border-box; font-family: inherit; font-weight: 600; }
                [data-theme='dark'] .glass-input { background: rgba(255,255,255,0.02); }
                .glass-input:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1); background: var(--surface-color); }
                .form-label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
            </style>

            <div class="page-title" style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 38px; font-weight: 800; letter-spacing: -1px;"><i class="fas fa-user-cog" style="color: #f59e0b; margin-right: 15px;"></i>Configure Node Matrix</h1>
                <p style="font-size: 16px; opacity: 0.8;">Modifying data variables for <strong style="font-family: monospace;">{{ member_email }}</strong>.</p>
            </div>

            <div class="glass-form-container">
                <form action="{{ url_for('edit_member', email=member_email) }}" method="POST">
                    <div style="margin-bottom: 25px;">
                        <label class="form-label" for="name">Alias (Full Name)</label>
                        <input type="text" id="name" name="name" class="glass-input" value="{{ member.name }}" required>
                    </div>

                    <div style="display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 250px;">
                            <label class="form-label" for="reg_no">Registry ID</label>
                            <input type="text" id="reg_no" name="reg_no" class="glass-input" value="{{ member.reg_no }}" required style="font-family: monospace; color: #f59e0b;">
                        </div>

                        <div style="flex: 1; min-width: 250px;">
                            <label class="form-label" for="department">Operational Department</label>
                            <input type="text" id="department" name="department" class="glass-input" value="{{ member.department }}" required>
                        </div>
                    </div>

                    <div style="margin-bottom: 35px; padding: 20px; background: rgba(245, 158, 11, 0.05); border-radius: 20px; border: 1px dashed rgba(245, 158, 11, 0.3);">
                        <label class="form-label" for="password" style="color: #b45309;"><i class="fas fa-key" style="margin-right: 5px;"></i> Authentication Hash</label>
                        <input type="text" id="password" name="password" class="glass-input" value="{{ member.password }}" required style="font-family: monospace; font-size: 13px;">
                        <small style="color: #b45309; font-size: 12px; margin-top: 10px; display: block; font-weight: 600;">You can forcibly override the user's encrypted handshake hash here.</small>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <button type="submit" class="btn" style="flex: 2; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #b45309); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); color: white;">
                            <i class="fas fa-save" style="margin-right: 8px;"></i> Write Overrides
                        </button>
                        <a href="{{ url_for('leader_dashboard') }}" class="btn" style="flex: 1; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 700; background: transparent; color: var(--text-secondary); text-align: center; border: 1px solid rgba(150,150,150,0.3);">Abort</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
{% endblock %}
